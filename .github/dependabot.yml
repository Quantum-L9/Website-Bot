version: 2
updates:
  # Root npm project
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'type:dependency']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-patch']

  # Bundled @quantum-l9/llm-router package
  - package-ecosystem: npm
    directory: /packages/llm-router
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
    open-pull-requests-limit: 3
    labels: ['dependencies', 'type:dependency']

  # GitHub Actions used by workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    labels: ['dependencies', 'type:dependency']
