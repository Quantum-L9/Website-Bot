name: Deploy to Vercel
# NOTE: no longer fires automatically on push to main. It used to deploy the
# bundled examples/supplemental-insurance-pros reference spec as if it were a
# real production client on every merge — that's CI drift: the reference
# client was quarantined to examples/ and deliberately has no real
# license/disclaimer data, so every auto-deploy failed fast (correctly) at the
# UnknownResolverStage compliance gate. See docs/factory-upgrade-build-plan.md
# (P-D), which already calls for retiring this push-to-deploy model. Real
# production deploys for actual clients go through build-site.yml
# (repository_dispatch / workflow_dispatch with a real client_id + spec_path).
# This workflow stays available for manual, on-demand runs only.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-to-vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.pipeline.outputs.deployment_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@quantum-l9'
      - run: npm ci --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run full pipeline
        id: pipeline
        run: |
          npx tsx scripts/run-pipeline.ts --spec=examples/supplemental-insurance-pros/domain_spec.normalized.yaml
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        env:
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          GITHUB_REPO_ID: ${{ github.event.repository.id }}
          GITHUB_REF: ${{ github.ref_name }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          NODE_ENV: production

      - name: Upload handoff contract artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: handoff-contract
          path: contracts/website_factory_integration.yaml
          retention-days: 90
