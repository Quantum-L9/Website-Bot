name: Build and Validate
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: build-and-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@quantum-l9'
      # npm ci: the committed lockfile now pins @quantum-l9/llm-router (resolved
      # from GitHub Packages), so installs are reproducible. NODE_AUTH_TOKEN
      # grants the packages:read needed to fetch that registry dependency.
      - run: npm ci --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run typecheck
      # Spec-drift guard: the committed flat domain_spec/ must equal
      # normalize(inputs/domain_spec.source.yaml), and be a structurally valid
      # DomainSpec. Fails fast if the source and generated spec drift apart.
      - name: Spec drift + validity guard
        run: npm run normalize-spec:check
      - name: Run launch env verification (optional)
        run: |
          if [ -f scripts/verify-launch-env.mjs ]; then
            node scripts/verify-launch-env.mjs --ci
          else
            echo "verify-launch-env.mjs not present — skipping"
          fi
      - run: npm run pipeline:dry
        env:
          CLIENT_ID: ci-test-client
          NODE_ENV: test
