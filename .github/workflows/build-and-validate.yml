name: Build and Validate
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run typecheck
      - name: Run launch env verification (optional)
        run: |
          if [ -f scripts/verify-launch-env.mjs ]; then
            node scripts/verify-launch-env.mjs --ci
          else
            echo "verify-launch-env.mjs not present — skipping"
          fi
      - run: npm run pipeline:dry
        env:
          CLIENT_ID: ci-test-client
          NODE_ENV: test
