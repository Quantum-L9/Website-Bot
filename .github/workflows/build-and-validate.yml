name: Build and Validate
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: build-and-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@quantum-l9'
      # npm ci: the committed lockfile now pins @quantum-l9/llm-router (resolved
      # from GitHub Packages), so installs are reproducible. NODE_AUTH_TOKEN
      # grants the packages:read needed to fetch that registry dependency.
      - run: npm ci --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run typecheck
      # Release-evidence JSON Schemas must be structurally sound and fail-closed
      # (additionalProperties:false, required `schema` const). Cheap, no runtime.
      - name: Validate evidence schemas
        run: npm run evidence:schemas
      # Evidence subsystem unit tests (store roundtrip/tamper, canonicalizer,
      # checkpoint, reference guards). Deterministic, no providers.
      - name: Evidence unit tests
        run: npm run evidence:test
      # Local deterministic site-factory tests (evidence chain, receipt stages,
      # Astro assembler). No providers, no network.
      - name: Site factory local tests
        run: npm run site:test:local
      # Spec-drift guard: the committed flat normalized spec must equal
      # normalize(<source>) for the bundled reference client under examples/, and
      # be a structurally valid DomainSpec. Fails fast if source and generated drift.
      - name: Spec drift + validity guard
        run: npm run normalize-spec:check
      - name: Run launch env verification (optional)
        run: |
          if [ -f scripts/verify-launch-env.mjs ]; then
            node scripts/verify-launch-env.mjs --ci
          else
            echo "verify-launch-env.mjs not present — skipping"
          fi
      - run: npm run pipeline:dry
        env:
          CLIENT_ID: ci-test-client
          NODE_ENV: test
