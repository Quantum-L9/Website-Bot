name: Build and Validate
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: build-and-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@quantum-l9'
      # npm install (not ci): the committed lockfile predates the
      # @quantum-l9/llm-router registry dependency and can't be regenerated
      # without a Packages-scoped token. CI resolves it via NODE_AUTH_TOKEN.
      - run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run typecheck
      - name: Run launch env verification (optional)
        run: |
          if [ -f scripts/verify-launch-env.mjs ]; then
            node scripts/verify-launch-env.mjs --ci
          else
            echo "verify-launch-env.mjs not present — skipping"
          fi
      - run: npm run pipeline:dry
        env:
          CLIENT_ID: ci-test-client
          NODE_ENV: test
