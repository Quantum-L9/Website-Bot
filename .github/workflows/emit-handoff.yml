name: Emit Handoff Contract
on:
  workflow_run:
    workflows: ["Deploy to Vercel"]
    types: [completed]

permissions:
  contents: read
  packages: read

jobs:
  emit-handoff:
    runs-on: ubuntu-latest
    if: >
      ${{ github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.head_repository.full_name == github.repository
        && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@quantum-l9'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download handoff contract from deploy run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: deploy-to-vercel.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: handoff-contract
          path: contracts/

      - name: Extract DEPLOYMENT_URL from contract
        id: extract
        run: |
          URL=$(node -e "const yaml=require('yaml'); const fs=require('fs'); const d=yaml.parse(fs.readFileSync('contracts/website_factory_integration.yaml','utf8')); process.stdout.write(String(d?.deployment?.vercel_url ?? ''));")
          echo "DEPLOYMENT_URL=$URL" >> "$GITHUB_OUTPUT"

      - name: Capture SEO baseline + register with SEO-Bot
        run: npx tsx scripts/run-pipeline.ts --skip=domain-spec-loader,unknown-resolver,design-intelligence,content-generation,schema-generator,posthog-snippet,vercel-deploy,visual-qa --auto-register-seo-bot
        env:
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SEO_BOT_URL: ${{ secrets.SEO_BOT_URL }}
          SEO_BOT_API_KEY: ${{ secrets.SEO_BOT_API_KEY }}
          DEPLOYMENT_URL: ${{ steps.extract.outputs.DEPLOYMENT_URL }}
          NODE_ENV: production

      - name: Upload final handoff contract
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: handoff-contract-final
          path: contracts/website_factory_integration.yaml
          retention-days: 90
