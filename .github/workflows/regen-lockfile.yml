name: Regenerate Lockfile
# One-off helper: regenerates package-lock.json so it includes
# @quantum-l9/llm-router (the committed lockfile predates that registry
# dependency). Runs entirely on GitHub — no local clone or PAT needed; the
# built-in GITHUB_TOKEN has packages:read for the org's published package.
#
# Usage: Actions tab -> "Regenerate Lockfile" -> Run workflow -> pick the branch.
# It commits the refreshed lockfile back to that branch (no-op if already in sync).
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: regen-lockfile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@quantum-l9'

      - name: Resolve dependencies into the lockfile
        run: npm install --package-lock-only --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit the refreshed lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already in sync — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: regenerate package-lock.json with @quantum-l9/llm-router"
          git push
