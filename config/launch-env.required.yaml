launch_env_contract:
  version: "2.0.0"
  project: "L9 Website Factory Bot"
  policy: "fail_closed_for_production_launch"
  values_must_not_be_fabricated: true
  groups:
    llm_intelligence:
      required_for_launch: false
      required_for_generation_claims: true
      variables:
        OPENROUTER_API_KEY: "OpenRouter API key for general-purpose LLM routing. Required for content generation and visual QA."
        PERPLEXITY_API_KEY: "Perplexity API key for search-grounded tasks. Required for competitor research and fact verification."
        CLIENT_ID: "Unique client identifier for budget tracking and multi-tenant isolation."
        MONTHLY_BUDGET_PER_CLIENT: "Monthly token budget in USD per client. Default 200."
        WEEKLY_BUDGET_TARGET: "Weekly soft budget target in USD. Default 50."
        SITE_URL: "Live site URL for visual QA screenshot capture and SEO verification."
    license:
      required_for_launch: true
      variables:
        PROJECT_LICENSE: "Operator-selected project license; blank means launch docs must remain Unknown."
        LICENSE_CHOICE_REQUIRED: "Must be false only after license is selected and documented."
    support:
      required_for_launch: true
      variables:
        SUPPORT_CONTACT_EMAIL: "Public support email or operational intake address."
        SUPPORT_CONTACT_URL: "Optional support URL."
    security:
      required_for_launch: true
      variables:
        SECURITY_CONTACT_EMAIL: "Security disclosure email."
        SECURITY_DISCLOSURE_URL: "Optional disclosure URL."
    domain:
      required_for_launch: true
      variables:
        PUBLIC_SITE_URL: "Canonical public site URL including scheme."
        PRODUCTION_DOMAIN: "Production domain expected to resolve to deployment."
        DOMAIN_VERIFICATION_REQUIRED: "Must remain true until domain check passes."
    form:
      required_for_launch: true
      variables:
        FORM_PROVIDER: "Provider name, e.g. webhook, formspree, custom, crm_proxy."
        FORM_ENDPOINT_URL: "Server-side or trusted endpoint that receives lead submissions."
        FORM_WEBHOOK_SECRET: "Secret for form webhook validation, stored only as secret."
        LEAD_NOTIFICATION_EMAIL: "Lead notification recipient, if email routing is used."
    crm:
      required_for_launch: false
      required_for_crm_launch_claim: true
      variables:
        CRM_PROVIDER: "CRM provider selector (e.g. acculynx, hubspot, salesforce, none). Chooses which CRM integration, if any, is used."
        CRM_API_BASE_URL: "CRM API base URL supplied by operator."
        CRM_CLIENT_ID: "CRM client id supplied by operator."
        CRM_CLIENT_SECRET: "CRM client secret supplied by operator (secret)."
        CRM_API_TOKEN: "CRM API token supplied by operator (secret)."
        CRM_TEST_MODE: "Must be true for synthetic validation until production handoff is approved."
    analytics:
      required_for_launch: false
      required_for_analytics_launch_claim: true
      variables:
        ANALYTICS_PROVIDER: "Approved analytics provider."
        ANALYTICS_MEASUREMENT_ID: "Provider measurement/site id."
        ANALYTICS_CONVERSION_EVENT: "Conversion event name."
        ANALYTICS_THANK_YOU_EVENT: "Thank-you page event name."
    vercel:
      required_for_deployment: true
      variables:
        VERCEL_ORG_ID: "Vercel org id from project settings."
        VERCEL_PROJECT_ID: "Vercel project id from project settings."
        VERCEL_TOKEN: "Secret deployment token."
        VERCEL_PRODUCTION_DEPLOYMENT: "Must be true only when production deploy is explicitly authorized."
    legal:
      required_for_launch: true
      variables:
        LEGAL_DISCLAIMER_APPROVED: "Must be true after legal/client approval."
        LEGAL_DISCLAIMER_VERSION: "Approved disclaimer version identifier."
        LEGAL_REVIEW_OWNER: "Person/entity responsible for legal approval."
    professional_license:
      required_for_launch: false
      required_when_license_display_required: true
      variables:
        PROFESSIONAL_LICENSE_NUMBER: "Professional/occupational license number, when the client's vertical requires displaying one."
        PROFESSIONAL_LICENSE_STATE: "Primary licensing state/jurisdiction."
        PROFESSIONAL_LICENSE_TYPE: "License type/profession (e.g. public_adjuster, contractor, attorney)."
        LICENSE_DISPLAY_REQUIRED: "Set true only when the client's vertical/compliance requires displaying a professional license; otherwise false."
